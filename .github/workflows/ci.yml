name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Firestore 격리 정책 — firebase 가 다시 기어들어오면 red.
      # (usb_csat 의 async/sync 어댑터 사고 재발 방지. Turso 단일 백엔드 원칙)
      - name: No-Firebase gate
        run: pnpm check:no-firebase

      # 저작권 방화벽 — 워크시트 지문 풀에 기출 문항이 새어들지 않았는지.
      - name: No-Kichul (기출) gate
        run: pnpm check:no-kichul

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
